name: iOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build (simulator, no signing)
        run: |
          xcodebuild build \
            -project Bolnicaapp/Bolnicaapp.xcodeproj \
            -scheme Bolnicaapp \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || xcodebuild build \
            -project Bolnicaapp/Bolnicaapp.xcodeproj \
            -scheme Bolnicaapp \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO

      - name: Run tests
        run: |
          xcodebuild test \
            -project Bolnicaapp/Bolnicaapp.xcodeproj \
            -scheme BolnicaappTests \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true
